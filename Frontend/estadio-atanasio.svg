<svg id="estadio-atanasio" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="atanasio-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="60%" stop-color="#13112e" />
      <stop offset="100%" stop-color="#0a0a18" />
    </radialGradient>
    <radialGradient id="atanasio-cancha" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d2a5e" />
      <stop offset="100%" stop-color="#0d0d2b" />
    </radialGradient>
    <filter id="atanasio-glow-hover">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#a78bfa" flood-opacity="0.6"/>
    </filter>
    <filter id="atanasio-glow-selected">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#fbbf24" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#fff" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="atanasio-stage-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4c1d95" />
      <stop offset="100%" stop-color="#1a0a3e" />
    </linearGradient>
    <filter id="atanasio-stage-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.4"/>
    </filter>
  </defs>

  <g id="background-layer">
    <rect width="800" height="600" fill="url(#atanasio-bg)" rx="0" />
