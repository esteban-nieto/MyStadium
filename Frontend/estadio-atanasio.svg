    <text x="400" y="354" text-anchor="middle" fill="#c4b5fd" font-family="Outfit,sans-serif" font-size="13" font-weight="700" letter-spacing="2">ESCENARIO</text>
    <g opacity="0.15">
      <ellipse cx="420" cy="335" rx="60" ry="30" fill="none" stroke="#facc15" stroke-width="0.5" />
