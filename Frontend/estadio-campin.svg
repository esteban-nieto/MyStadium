<svg id="estadio-campin" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="campin-bg" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#0f0c29" />
      <stop offset="60%" stop-color="#1a1025" />
      <stop offset="100%" stop-color="#0a0815" />
    </radialGradient>
    <linearGradient id="campin-cancha" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1846" />
      <stop offset="100%" stop-color="#0a0818" />
    </linearGradient>
    <filter id="campin-glow-hover">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="campin-glow-selected">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#fbbf24" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#fff" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="campin-stage-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b21b6" />
      <stop offset="100%" stop-color="#1e0f4a" />
    </linearGradient>
    <filter id="campin-stage-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#6d28d9" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g id="background-layer">
    <rect width="800" height="600" fill="url(#campin-bg)" rx="0" />
    <rect x="310" y="255" width="180" height="90" rx="4" fill="url(#campin-cancha)" stroke="#312e81" stroke-width="1.5" />
    <rect x="325" y="268" width="150" height="64" rx="2" fill="#1e1b4b" stroke="#4338ca" stroke-width="0.5" opacity="0.4" />
    <line x1="400" y1="255" x2="400" y2="345" stroke="#312e81" stroke-width="0.5" opacity="0.3" />
    <line x1="310" y1="300" x2="490" y2="300" stroke="#312e81" stroke-width="0.5" opacity="0.3" />
  </g>

  <g id="viewport-layer">
    <g id="zones-layer">
      <g id="norte-alta" class="zona-seatmap" data-zona="norte-alta" data-capacity="800">
        <path d="M 170,25 C 240,5 560,5 630,25 L 610,55 L 600,65 C 540,55 260,55 200,65 L 190,55 170,25 Z" />
      </g>
      <g id="norte-baja" class="zona-seatmap" data-zona="norte-baja" data-capacity="600">
        <path d="M 200,70 L 600,70 L 580,100 L 570,110 C 530,100 270,100 230,110 L 220,100 200,70 Z" />
      </g>
      <g id="sur-alta" class="zona-seatmap" data-zona="sur-alta" data-capacity="800">
        <path d="M 170,575 C 240,595 560,595 630,575 L 610,545 L 600,535 C 540,545 260,545 200,535 L 190,545 170,575 Z" />
      </g>
      <g id="sur-baja" class="zona-seatmap" data-zona="sur-baja" data-capacity="600">
        <path d="M 200,530 L 600,530 L 580,500 L 570,490 C 530,500 270,500 230,490 L 220,500 200,530 Z" />
      </g>
      <g id="oriental-norte" class="zona-seatmap" data-zona="oriental-norte" data-capacity="500">
        <path d="M 630,25 C 655,50 665,80 665,110 L 650,115 L 635,120 C 625,105 615,90 600,80 L 610,65 630,25 Z" />
      </g>
      <g id="oriental-central" class="zona-seatmap" data-zona="oriental-central" data-capacity="400">
        <path d="M 665,120 C 675,160 675,240 665,280 L 648,275 L 635,270 C 640,250 645,230 645,200 C 645,180 640,160 635,140 L 648,125 Z" />
      </g>
      <g id="oriental-sur" class="zona-seatmap" data-zona="oriental-sur" data-capacity="500">
        <path d="M 665,490 C 655,520 645,545 630,575 L 610,545 L 600,530 C 615,525 630,515 650,505 L 660,495 Z" />
      </g>
      <g id="occidental-norte" class="zona-seatmap" data-zona="occidental-norte" data-capacity="500">
        <path d="M 170,25 C 145,50 135,80 135,110 L 150,115 L 165,120 C 175,105 185,90 200,80 L 190,65 170,25 Z" />
      </g>
      <g id="occidental-central" class="zona-seatmap" data-zona="occidental-central" data-capacity="400">
        <path d="M 135,120 C 125,160 125,240 135,280 L 152,275 L 165,270 C 160,250 155,230 155,200 C 155,180 160,160 165,140 L 152,125 Z" />
      </g>
      <g id="occidental-sur" class="zona-seatmap" data-zona="occidental-sur" data-capacity="500">
        <path d="M 135,490 C 145,520 155,545 170,575 L 190,545 L 200,530 C 185,525 170,515 150,505 L 140,495 Z" />
      </g>
      <g id="palcos" class="zona-seatmap" data-zona="palcos" data-capacity="200">
        <path d="M 250,130 C 310,120 490,120 550,130 L 535,160 L 520,170 C 480,160 320,160 280,170 L 265,160 250,130 Z" />
      </g>
      <g id="vip" class="zona-seatmap" data-zona="vip" data-capacity="100">
        <path d="M 270,185 C 330,175 470,175 530,185 L 515,210 L 500,220 C 460,210 340,210 300,220 L 285,210 270,185 Z" />
      </g>
    </g>
    <g id="seats-layer"></g>
  </g>

  <g id="overlay-layer">
    <rect x="310" y="255" width="180" height="90" rx="4" fill="url(#campin-stage-grad)" filter="url(#campin-stage-glow)" opacity="0.85" />
    <text x="400" y="304" text-anchor="middle" fill="#c4b5fd" font-family="Outfit,sans-serif" font-size="13" font-weight="700" letter-spacing="2">ESCENARIO</text>
    <g opacity="0.12">
      <rect x="330" y="270" width="140" height="60" rx="2" fill="none" stroke="#facc15" stroke-width="0.5" />
    </g>
  </g>
</svg>
